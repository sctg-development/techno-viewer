name: GHRelease

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - doc/**
      - schematics/**
      - drawings/**
      - package-lock.json
      - .github/workflows/deploy-pages.yaml

  #   release:
  #     types: [published]
  #   schedule:
  #     - cron: '0 0 * * 0' # every Sunday at midnight
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  packages: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build rencrypt
        run: cargo build --manifest-path rencrypt/Cargo.toml --release
      
      - name: Encrypt demo assets
        run: |
          ./rencrypt/target/release/rencrypt encrypt --path drawings/ --path schematics/ --path doc/ --path agro-crypt/ --keep-plaintext-manifest -v
              
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build SPA
        run: |
          # Copy cad-viewer CSS (gitignored, generated at build time)
          cp node_modules/@mlightcad/cad-viewer/dist/index.css src/cad-viewer.css
          # encrypted/ is automatically copied to dist/encrypted/ by encryptedAssetsPlugin
          echo "APP_NAME=INDUSTRIAL-ANALYZER" > .env
          npm run build:env
          
      - name: Build project
        # You can change the base path to your repository name
        run: |
          export NODE_ENV=production
          BASE_URL=${{ github.event.repository.name }} npx vite build --base="/${{ github.event.repository.name }}/"
        
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Upload docs directory
          path: "dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
